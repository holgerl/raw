<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Raw</title>
        <script src="../dist/raw.build.js"></script>

        <style>
            html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
            }

            #myCanvas {
                width: 100%;
                height: 100%;
            }
        </style>
    </head> 
<body>
    <canvas id="myCanvas"></canvas>

    <script>
        /// Basic animated scene

        Raw.init(document.getElementById('myCanvas'));
        Raw.settings.clearColor = "#000";

        function loop() {
            Raw.onFrame();
            requestAnimationFrame(loop);
        }

        loop();

        const square = Raw.scenegraph.add({
            update: function() {
                this.rotation += Raw.deltaSeconds;
            },
            draw: function(ctx, canvas) {
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 4;
                ctx.strokeRect(-40, -40, 80, 80);
            }
        });

        square.scale = {x: 1.5, y: 1.5};
    </script>
</body>
</html>
