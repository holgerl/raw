<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raw examples</title>
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            padding: 16px;
            background: Canvas;
            color: CanvasText;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 12px;
        }

        .card {
            overflow: hidden;
            background: Canvas;
        }

        .card-header {
            font-family: monospace;
            padding: 8px 10px;
            font-size: 0.75rem;
            white-space: normal;
            line-height: 1.35;
            max-height: 12rem;
            overflow: auto;
            white-space: pre;
        }

        iframe {
            display: block;
            width: 100%;
            height: 320px;
            border: 0;
            background: #fff;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <section id="iframeGrid" class="grid" aria-label="Iframe Grid"></section>

    <script>
        const urls = [
            "./collision.html",
            "./arrows.html",
            "./scenegraph.html",
            "./grid.html",
            "./timer.html",
            "./drag.html",
            "./waves.html",
        ];

        const iframeGrid = document.getElementById("iframeGrid");
        const targetWordPattern = /\/\/\//i;

        function extractMatchingLines(text) {
            return text
                .split(/\r?\n/)
                .filter((line) => line && targetWordPattern.test(line));
        }

        async function tryGetFetchedText(url) {
            try {
                const response = await fetch(url, { mode: "cors" });
                if (!response.ok) {
                    return "";
                }

                return await response.text();
            } catch (e) {
                console.error(e);   
                return "";
            }
        }

        function renderHeaderLines(header, lines) {
            header.replaceChildren();

            if (!lines.length) {
                header.textContent = "No lines containing '///' were found.";
                return;
            }

            const lineEl = document.createElement("div");
            lineEl.textContent = lines.join("\n");
            header.appendChild(lineEl);
        }

        urls.forEach((url) => {
            const card = document.createElement("article");
            card.className = "card";

            const header = document.createElement("div");
            header.className = "card-header";
            header.textContent = `Loading lines from ${url}...`;

            const frame = document.createElement("iframe");
            frame.src = url;
            frame.loading = "lazy";
            frame.referrerPolicy = "no-referrer";
            frame.title = `Preview of ${url}`;

            frame.addEventListener("load", async () => {
                try {
                    const sourceText = await tryGetFetchedText(url);

                    if (!sourceText) {
                        header.textContent = "Cannot read iframe content for this URL (likely cross-origin or file access restrictions).";
                        return;
                    }

                    const matchingLines = extractMatchingLines(sourceText).map((line) => line.replace(targetWordPattern, ""));

                    // Find the shortest indentation among the matching lines to trim it from all lines for better readability
                    const minIndentation = matchingLines.reduce((minIndent, line) => {
                        const indentMatch = line.match(/^(\s*)/);
                        const indentLength = indentMatch ? indentMatch[1].length : 0;
                        return Math.min(minIndent, indentLength);
                    }, Infinity);

                    // Trim the common indentation from all matching lines
                    const trimmedLines = matchingLines.map((line) => line.slice(minIndentation));

                    renderHeaderLines(header, trimmedLines);
                } catch(e) {
                    header.textContent = "Cannot read iframe content for this URL (likely cross-origin or file access restrictions).";
                    console.error(e);   
                }
            });

            card.appendChild(header);
            card.appendChild(frame);
            iframeGrid.appendChild(card);
        });
    </script>
</body>

</html>
