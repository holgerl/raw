<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Raw</title>
        <script src="../dist/raw.build.js"></script>

        <style>
            html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
            }

            #myContainer {
                width: 100%;
                height: 100%;
            }
        </style>
    </head> 
<body>
    <div id="myContainer">
        <canvas id="myCanvas"></canvas>
    </div>

    <script>
        /// Hierarchical scene graph

        Raw.init(document.getElementById('myCanvas'));
        Raw.settings.clearColor = "#000";

        function loop() {
            Raw.onFrame();
            requestAnimationFrame(loop);
        }

        loop();

        window.addEventListener("keydown", (event) => {
            event.key == "d" && (Raw.settings.debug = !Raw.settings.debug);
        });

        Raw.camera.zoom = 0.6;
        Raw.camera.position = {x: 0, y: -30};

        let displacement = 0;

        const wheelPositions = [{x: -11, y: 10}, {x: 11, y: 10}];
        const wheelRadius = 6;
        const groundSpeed = 150;    

        const groundFormula = (x) => {
            return Math.sin((x + displacement) * 0.05) * 5;
        };

        const ground = Raw.scenegraph.add({
            update: function() {
                displacement += groundSpeed * Raw.deltaSeconds;
            },
            draw: function(ctx, canvas) {
                ctx.strokeStyle = "#fff";
                ctx.beginPath();
                for (let x = -canvas.width/2; x < canvas.width/2; x++) {
                    ctx.lineTo(x, groundFormula(x));
                }
                ctx.stroke();
            }
        });

        const car = Raw.scenegraph.add({
            pivot: wheelPositions[0],
            update: function() {
                const groundPositions = wheelPositions.map(({x, y}) => ({
                        x: x, 
                        y: groundFormula(x) - y - wheelRadius
                }));
                this.position.y = groundPositions[0].y;
                this.rotation = Raw.angle(groundPositions[0], groundPositions[1]);
            }
        });

        const body = car.add({
            draw: function(ctx, canvas) {
                ctx.strokeStyle = "#fff";
                ctx.beginPath();
                ctx.moveTo(-17, -10);
                ctx.lineTo(5, -10);
                ctx.lineTo(10, -2);
                ctx.lineTo(22, 0);
                ctx.lineTo(22, 10);
                ctx.lineTo(-20, 10);
                ctx.lineTo(-20, 0);
                ctx.lineTo(-17, -10);
                ctx.stroke();
            },
            update: function() {
                const wiggleAmount = 0.03;
                const bounceAmount = 1;
                const speed = 10;
                this.position.y = Math.sin(Raw.timeSeconds * speed/2) * bounceAmount;
                this.rotation = Math.sin(Raw.timeSeconds * speed) * wiggleAmount;
            }
        })

        body.position = {x: 1, y: 0}; // TODO: Fiks dette også når object er borte

        const antennaLength = 20;
        const antennaSway = 0.05;

        const antenna = body.add({
            draw: function(ctx, canvas) {
                ctx.strokeStyle = "#fff";
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(0, -antennaLength/2);
                ctx.stroke();
            },
            update: function() {
                this.rotation = groundFormula(0) * antennaSway;
            }
        });

        antenna.add({
            pivot: {x: 0, y: -antennaLength/2},
            draw: function(ctx, canvas) {
                ctx.strokeStyle = "#fff";
                ctx.beginPath();
                ctx.moveTo(0, -antennaLength/2);
                ctx.lineTo(0, -antennaLength);

                ctx.stroke();
            },
            update: function() {
                this.rotation = groundFormula(0) * antennaSway;
            }
        });

        antenna.position = {x: -14, y: -10};

        wheelPositions.forEach((wheelPos) => {
            const wheel = car.add({
                position: wheelPos, // TODO: Dette vil vel gå når object ikke er noe lenger. Nå har det ikke effekt. Vil gjøre at slik kode blir mye mer samlet
                draw: function(ctx, canvas) {
                    ctx.strokeStyle = "#fff";
                    ctx.fillStyle = "#000";
                    ctx.beginPath();
                    ctx.arc(0, 0, wheelRadius, 0, Math.PI * 2);
                    ctx.fill()
                    ctx.stroke();

                    // Draw dots around as spokes:
                    ctx.fillStyle = "#fff";
                    for (let i = 0; i < 5; i++) {
                        const angle = (i/5) * Math.PI * 2;
                        const pos = {
                            x: Math.cos(angle) * 2.5,
                            y: Math.sin(angle) * 2.5
                        };
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, 0.8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                },
                update: function() {
                    this.rotation += groundSpeed * Raw.deltaSeconds / 10;
                }
            });

            wheel.position = wheelPos;
        });
    </script>
</body>
</html>
